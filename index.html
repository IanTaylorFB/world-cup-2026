<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Fixed layout width: phones render the full desktop layout and pan/pinch-zoom it,
     rather than shrinking the fluid parts and clipping the 1100px-wide bracket.
     No user-scalable/maximum-scale, so pinch-zoom stays enabled. Desktop ignores this. -->
<meta name="viewport" content="width=1200">
<title>FIFA World Cup 2026</title>
<script src="data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --gold: #e3b341;
    --new: #58a6ff;
  }

  .new-dot { color: var(--new); font-size: 9px; vertical-align: middle; margin: 0 2px; }

  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 600; color: var(--gold); }
  header .meta { color: var(--muted); font-size: 12px; }
  .tab-bar { display: flex; align-items: center; gap: 4px; }
  .header-link {
    color: var(--muted); font-size: 13px; text-decoration: none;
    padding: 4px 8px; border-radius: 6px; white-space: nowrap;
  }
  .header-link:hover { color: var(--text); background: var(--border); }
  .header-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .tab {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 13px;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Layout ── */
  main { padding: 20px; }

  /* ── Group Stage ── */
  #group-view { display: none; }
  /* overflow-x + inner min-width mirror the knockout view, so the 3-column grid
     scrolls horizontally on a narrow viewport instead of clipping the right edge. */
  #group-view.visible { display: block; overflow-x: auto; }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    min-width: 1380px;
  }

  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer;
    background: #1c2128; border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .group-header:hover { background: #212830; }
  .group-header h2 { font-size: 14px; font-weight: 600; color: var(--gold); }
  .group-header .chevron { transition: transform 0.2s; color: var(--muted); font-size: 10px; }
  .group-card.open .chevron { transform: rotate(180deg); }

  /* Standings table */
  .standings { width: 100%; border-collapse: collapse; }
  .standings th {
    padding: 4px 8px; font-size: 11px; color: var(--muted); font-weight: 500;
    text-align: center; border-bottom: 1px solid var(--border);
  }
  .standings th:first-child { text-align: left; padding-left: 14px; }
  .standings td {
    padding: 6px 8px; text-align: center; font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .standings td:first-child { text-align: left; padding-left: 14px; }
  .standings tr:last-child td { border-bottom: none; }
  .standings .pos { color: var(--muted); font-size: 11px; width: 18px; }
  .standings .pts { font-weight: 700; color: var(--accent); }
  .standings tr.qualified td:first-child { border-left: 3px solid var(--green); padding-left: 11px; }
  .standings tr.playoff td:first-child { border-left: 3px solid var(--yellow); padding-left: 11px; }

  /* Team identity cells */
  .team-cell { display: flex; align-items: center; gap: 5px; }
  .team-dot-slot { font-size: 9px; color: var(--new); width: 10px; flex-shrink: 0; }
  .team-flag { font-size: 15px; line-height: 1; flex-shrink: 0; }
  .team-abbr { font-size: 11px; color: var(--muted); font-weight: 500; flex-shrink: 0; }
  .team-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }

  /* Matches section */
  .matches-section { display: none; }
  .group-card.open .matches-section { display: block; }

  .matches-label {
    padding: 8px 14px 4px; font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
    border-top: 1px solid var(--border);
  }

  .match-row {
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .match-row:last-child { border-bottom: none; }

  .match-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .match-datetime { color: var(--muted); font-size: 11px; }
  .match-teams {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
  }
  .match-teams .team { flex: 1; display: flex; align-items: center; gap: 4px; }
  .match-teams .home { justify-content: flex-end; }
  .match-teams .away { justify-content: flex-start; }
  .match-teams .team .team-name { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .match-teams .team .team-abbr { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .match-teams .team .team-flag { font-size: 15px; line-height: 1; flex-shrink: 0; }
  .score-box {
    background: #21262d; border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 10px; font-weight: 700; font-size: 14px; min-width: 50px;
    text-align: center;
  }
  .score-box.upcoming { color: var(--muted); }

  .match-details { margin-top: 4px; padding-left: 4px; }
  .goal-line { color: #3fb950; font-size: 11px; line-height: 1.6; }
  .goal-line .minute { color: var(--muted); }
  .red-line { color: var(--red); font-size: 11px; line-height: 1.6; }
  .yt-link {
    display: inline-flex; align-items: center; gap: 4px;
    color: #ff4e45; font-size: 11px; text-decoration: none; margin-top: 4px;
  }
  .yt-link:hover { text-decoration: underline; }

  /* ── Knockout ── */
  #knockout-view { display: none; overflow-x: auto; }
  #knockout-view.visible { display: block; }

  .bracket-container {
    display: flex;
    align-items: stretch;
    min-width: 1100px;
    padding: 16px 0;
  }

  .bracket-half {
    display: flex;
    flex: 1;
  }
  .bracket-half.right { flex-direction: row-reverse; }

  .round-col {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 160px;
    padding: 0 4px;
  }

  .round-label {
    font-size: 10px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    text-align: center; padding-bottom: 8px;
  }

  .ko-match-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }

  /* Pair wrapper — groups two matches that feed into the next round */
  .match-pair {
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  /* Top match in a pair: draw from its centre down to the pair midpoint */
  .bracket-half.left  .match-pair .ko-match-wrapper:nth-child(1)::after,
  .bracket-half.right .match-pair .ko-match-wrapper:nth-child(1)::after {
    content: '';
    position: absolute;
    top: 50%;
    height: 50%;
    width: 8px;
  }
  /* Bottom match in a pair: draw from the pair midpoint up to its centre */
  .bracket-half.left  .match-pair .ko-match-wrapper:nth-child(2)::after,
  .bracket-half.right .match-pair .ko-match-wrapper:nth-child(2)::after {
    content: '';
    position: absolute;
    top: 0;
    height: 50%;
    width: 8px;
  }

  /* Left bracket: connectors on the right */
  .bracket-half.left .match-pair .ko-match-wrapper:nth-child(1)::after {
    right: 0;
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .bracket-half.left .match-pair .ko-match-wrapper:nth-child(2)::after {
    right: 0;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* Right bracket: connectors on the left (mirrored) */
  .bracket-half.right .match-pair .ko-match-wrapper:nth-child(1)::after {
    left: 0;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
  }
  .bracket-half.right .match-pair .ko-match-wrapper:nth-child(2)::after {
    left: 0;
    border-bottom: 1px solid var(--border);
    border-left: 1px solid var(--border);
  }

  .ko-match {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
    margin: 3px 8px;
  }
  .ko-match:hover { border-color: var(--accent); }

  .ko-team {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; font-size: 12px; line-height: 1.3;
    border-bottom: 1px solid var(--border);
  }
  .ko-team:last-child { border-bottom: none; }
  .ko-team .name { color: var(--text); flex: 1; }
  .ko-team .tbd { color: var(--muted); font-style: italic; flex: 1; }
  .ko-team .ko-score { font-weight: 700; color: var(--accent); min-width: 18px; text-align: right; }
  .ko-team .ko-score.win { color: var(--green); }
  .ko-team .ko-date { font-size: 10px; color: var(--muted); text-align: center; padding: 3px 8px; }
  .ko-team .predicted { color: var(--muted); font-style: italic; flex: 1; font-size: 11px; }
  .ko-team .predicted .pred-pos { font-size: 10px; opacity: 0.8; }

  .final-col {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-width: 170px;
    padding: 0 8px;
  }
  .final-col .round-label { text-align: center; }
  .third-place-section { margin-top: 20px; text-align: center; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; max-width: 440px; width: 90%;
    position: relative;
  }
  .modal h3 { font-size: 15px; margin-bottom: 4px; }
  .modal .modal-date { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  .modal .modal-score { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 16px; letter-spacing: 2px; }
  .modal .section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin: 10px 0 4px; }
  .modal .modal-goal { font-size: 13px; color: var(--green); margin-bottom: 2px; }
  .modal .modal-red { font-size: 13px; color: var(--red); margin-bottom: 2px; }
  .modal .modal-yt { display: block; margin-top: 12px; color: #ff4e45; text-decoration: none; font-size: 13px; }
  .modal .modal-yt:hover { text-decoration: underline; }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; color: var(--muted);
    font-size: 20px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
</style>
</head>
<body>

<header>
  <div>
    <h1>⚽ FIFA World Cup 2026</h1>
    <div class="meta" id="updated-label"></div>
  </div>
  <div class="tab-bar">
    <a class="header-link" href="README.md" target="_blank">ℹ️ About</a>
    <a class="header-link" href="LICENSE" target="_blank">License</a>
    <div class="header-sep"></div>
    <button class="tab active" id="tab-group" onclick="showView('group')">Group Stage</button>
    <button class="tab" id="tab-knockout" onclick="showView('knockout')">Knockout</button>
  </div>
</header>

<main>
  <div id="group-view"></div>
  <div id="knockout-view"></div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ── Team lookup ───────────────────────────────────────────────────────────────

const TEAMS = {
  "Mexico":                   {flag:"🇲🇽", abbr:"MEX"},
  "South Africa":             {flag:"🇿🇦", abbr:"RSA"},
  "South Korea":              {flag:"🇰🇷", abbr:"KOR"},
  "Czech Republic":           {flag:"🇨🇿", abbr:"CZE"},
  "Canada":                   {flag:"🇨🇦", abbr:"CAN"},
  "Bosnia and Herzegovina":   {flag:"🇧🇦", abbr:"BIH"},
  "Qatar":                    {flag:"🇶🇦", abbr:"QAT"},
  "Switzerland":              {flag:"🇨🇭", abbr:"SUI"},
  "Brazil":                   {flag:"🇧🇷", abbr:"BRA"},
  "Morocco":                  {flag:"🇲🇦", abbr:"MAR"},
  "Haiti":                    {flag:"🇭🇹", abbr:"HAI"},
  "Scotland":                 {flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿", abbr:"SCO"},
  "United States":            {flag:"🇺🇸", abbr:"USA"},
  "Paraguay":                 {flag:"🇵🇾", abbr:"PAR"},
  "Australia":                {flag:"🇦🇺", abbr:"AUS"},
  "Turkey":                   {flag:"🇹🇷", abbr:"TUR"},
  "Germany":                  {flag:"🇩🇪", abbr:"GER"},
  "Curaçao":                  {flag:"🇨🇼", abbr:"CUW"},
  "Ivory Coast":              {flag:"🇨🇮", abbr:"CIV"},
  "Ecuador":                  {flag:"🇪🇨", abbr:"ECU"},
  "Netherlands":              {flag:"🇳🇱", abbr:"NED"},
  "Japan":                    {flag:"🇯🇵", abbr:"JPN"},
  "Sweden":                   {flag:"🇸🇪", abbr:"SWE"},
  "Tunisia":                  {flag:"🇹🇳", abbr:"TUN"},
  "Belgium":                  {flag:"🇧🇪", abbr:"BEL"},
  "Egypt":                    {flag:"🇪🇬", abbr:"EGY"},
  "Iran":                     {flag:"🇮🇷", abbr:"IRN"},
  "New Zealand":              {flag:"🇳🇿", abbr:"NZL"},
  "Spain":                    {flag:"🇪🇸", abbr:"ESP"},
  "Cape Verde":               {flag:"🇨🇻", abbr:"CPV"},
  "Saudi Arabia":             {flag:"🇸🇦", abbr:"KSA"},
  "Uruguay":                  {flag:"🇺🇾", abbr:"URU"},
  "France":                   {flag:"🇫🇷", abbr:"FRA"},
  "Senegal":                  {flag:"🇸🇳", abbr:"SEN"},
  "Iraq":                     {flag:"🇮🇶", abbr:"IRQ"},
  "Norway":                   {flag:"🇳🇴", abbr:"NOR"},
  "Argentina":                {flag:"🇦🇷", abbr:"ARG"},
  "Algeria":                  {flag:"🇩🇿", abbr:"ALG"},
  "Austria":                  {flag:"🇦🇹", abbr:"AUT"},
  "Jordan":                   {flag:"🇯🇴", abbr:"JOR"},
  "Portugal":                 {flag:"🇵🇹", abbr:"POR"},
  "DR Congo":                 {flag:"🇨🇩", abbr:"COD"},
  "Uzbekistan":               {flag:"🇺🇿", abbr:"UZB"},
  "Colombia":                 {flag:"🇨🇴", abbr:"COL"},
  "England":                  {flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", abbr:"ENG"},
  "Croatia":                  {flag:"🇭🇷", abbr:"CRO"},
  "Ghana":                    {flag:"🇬🇭", abbr:"GHA"},
  "Panama":                   {flag:"🇵🇦", abbr:"PAN"},
};

function teamInfo(name) {
  return TEAMS[name] || {flag:"🏳", abbr:"???"};
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function fmtDatetime(date_bst, time_bst) {
  if (!date_bst) return '';
  const iso = time_bst ? `${date_bst}T${time_bst}:00+01:00` : `${date_bst}T12:00:00+01:00`;
  const dt = new Date(iso);
  const datePart = dt.toLocaleDateString([], {weekday:'short', day:'numeric', month:'short'});
  if (!time_bst) return datePart;
  const timePart = dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', timeZoneName:'short'});
  return `${datePart} ${timePart}`;
}

function fmtUpdated(iso) {
  const dt = new Date(iso);
  const datePart = dt.toLocaleDateString([], {weekday:'short', day:'numeric', month:'short', year:'numeric'});
  const timePart = dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', timeZoneName:'short'});
  return `Updated ${datePart} ${timePart}`;
}

function computeStandings(group) {
  const teams = {};
  group.teams.forEach(t => { teams[t] = {name:t, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0}; });
  group.matches.forEach(m => {
    if (!m.score) return;
    const h = teams[m.home], a = teams[m.away];
    if (!h || !a) return;
    h.p++; a.p++;
    h.gf += m.score.h; h.ga += m.score.a;
    a.gf += m.score.a; a.ga += m.score.h;
    h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
    if (m.score.h > m.score.a) { h.w++; h.pts += 3; a.l++; }
    else if (m.score.h < m.score.a) { a.w++; a.pts += 3; h.l++; }
    else { h.d++; h.pts++; a.d++; a.pts++; }
  });
  return Object.values(teams).sort((a,b) =>
    b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name)
  );
}

function fmtGoal(g) {
  let s = `${g.p} ${g.m}'`;
  if (g.og) s += ' (og)';
  if (g.pen) s += ' (pen)';
  return s;
}

// ── Match detail modal ────────────────────────────────────────────────────────

function openMatch(match, title) {
  const m = document.getElementById('modal-content');
  const played = !!match.score;
  let html = `<button class="modal-close" onclick="closeModal()">✕</button>`;
  html += `<h3>${title}</h3>`;
  html += `<div class="modal-date">${fmtDatetime(match.date_bst, match.time_bst)}</div>`;
  if (played) {
    html += `<div class="modal-score">${match.score.h} – ${match.score.a}</div>`;
    if (match.goals && match.goals.length) {
      html += `<div class="section-title">Goals</div>`;
      match.goals.forEach(g => {
        const side = (g.t === match.home) ? '⚽ ' : '⚽ ';
        html += `<div class="modal-goal">${side}${g.t}: ${fmtGoal(g)}</div>`;
      });
    }
    if (match.reds && match.reds.length) {
      html += `<div class="section-title">Red Cards</div>`;
      match.reds.forEach(r => {
        html += `<div class="modal-red">🟥 ${r.t}: ${r.p} ${r.m}'</div>`;
      });
    }
    if (match.yt) {
      html += `<a class="modal-yt" href="${match.yt}" target="_blank">▶ Watch highlights on YouTube</a>`;
    }
  } else {
    html += `<div style="text-align:center;padding:20px;color:var(--muted)">Not yet played</div>`;
  }
  m.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open'); });

// ── Group Stage ───────────────────────────────────────────────────────────────

function renderGroups() {
  const container = document.getElementById('group-view');
  const grid = document.createElement('div');
  grid.className = 'groups-grid';

  Object.entries(WC_DATA.groups).forEach(([letter, group]) => {
    const standings = computeStandings(group);
    const card = document.createElement('div');
    card.className = 'group-card';

    // Teams with a newly-completed match
    const newTeams = new Set();
    group.matches.forEach(m => { if (m.new) { newTeams.add(m.home); newTeams.add(m.away); } });

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `<h2>Group ${letter}</h2><span class="chevron">▼</span>`;
    hdr.onclick = () => card.classList.toggle('open');

    // Standings
    let stHtml = `<table class="standings">
      <thead><tr>
        <th></th><th></th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
      </tr></thead><tbody>`;
    const isTop8Third = Object.values(WC_DATA.predictions.best_thirds_slots || {}).some(s => s.group === letter);
    standings.forEach((t, i) => {
      const cls = i < 2 ? 'qualified' : (i === 2 && isTop8Third ? 'playoff' : '');
      const {flag, abbr} = teamInfo(t.name);
      const dotSlot = newTeams.has(t.name) ? '<span class="team-dot-slot">⬤</span>' : '<span class="team-dot-slot"> </span>';
      stHtml += `<tr class="${cls}">
        <td class="pos">${i+1}</td>
        <td><div class="team-cell">${dotSlot}<span class="team-flag">${flag}</span><span class="team-abbr">${abbr}</span><span class="team-name">${t.name}</span></div></td>
        <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}</td><td>${t.ga}</td>
        <td>${t.gd > 0 ? '+' : ''}${t.gd}</td>
        <td class="pts">${t.pts}</td>
      </tr>`;
    });
    stHtml += '</tbody></table>';

    // Matches
    const playedMatches = group.matches.filter(m => m.score);
    const upcomingMatches = group.matches.filter(m => !m.score);

    let matchHtml = '';

    if (playedMatches.length) {
      matchHtml += `<div class="matches-label">Played</div>`;
      playedMatches.forEach(m => {
        const dt = fmtDatetime(m.date_bst, m.time_bst);
        const homeGoals = m.goals.filter(g => g.t === m.home && !g.og).map(fmtGoal)
          .concat(m.goals.filter(g => g.t === m.away && g.og).map(g => fmtGoal(g) + ' ✕'));
        const awayGoals = m.goals.filter(g => g.t === m.away && !g.og).map(fmtGoal)
          .concat(m.goals.filter(g => g.t === m.home && g.og).map(g => fmtGoal(g) + ' ✕'));
        const homeReds = m.reds.filter(r => r.t === m.home).map(r => `${r.p} ${r.m}'`);
        const awayReds = m.reds.filter(r => r.t === m.away).map(r => `${r.p} ${r.m}'`);

        const newDot = m.new ? '<span class="new-dot">⬤</span>' : '';
        const hi = teamInfo(m.home), ai = teamInfo(m.away);
        matchHtml += `<div class="match-row" onclick='openMatch(${JSON.stringify(m)}, "${m.home} vs ${m.away}")' style="cursor:pointer">
          <div class="match-datetime">${dt}</div>
          <div class="match-teams">
            <span class="team home"><span class="team-name">${m.home}</span><span class="team-abbr">${hi.abbr}</span><span class="team-flag">${hi.flag}</span></span>
            <span class="score-box">${m.score.h} – ${m.score.a}</span>
            <span class="team away"><span class="team-flag">${ai.flag}</span><span class="team-abbr">${ai.abbr}</span><span class="team-name">${m.away}</span>${newDot}</span>
          </div>
          <div class="match-details">`;
        if (homeGoals.length) matchHtml += `<div class="goal-line">⚽ ${homeGoals.join(', ')}</div>`;
        if (awayGoals.length) matchHtml += `<div class="goal-line">⚽ ${awayGoals.join(', ')}</div>`;
        if (homeReds.length) matchHtml += `<div class="red-line">🟥 ${m.home}: ${homeReds.join(', ')}</div>`;
        if (awayReds.length) matchHtml += `<div class="red-line">🟥 ${m.away}: ${awayReds.join(', ')}</div>`;
        if (m.yt) matchHtml += `<a class="yt-link" href="${m.yt}" target="_blank" onclick="event.stopPropagation()">▶ Highlights</a>`;
        matchHtml += `</div></div>`;
      });
    }

    if (upcomingMatches.length) {
      matchHtml += `<div class="matches-label">Upcoming</div>`;
      upcomingMatches.forEach(m => {
        const dt = fmtDatetime(m.date_bst, m.time_bst);
        const uhi = teamInfo(m.home), uai = teamInfo(m.away);
        matchHtml += `<div class="match-row">
          <div class="match-datetime">${dt}</div>
          <div class="match-teams">
            <span class="team home"><span class="team-name">${m.home}</span><span class="team-abbr">${uhi.abbr}</span><span class="team-flag">${uhi.flag}</span></span>
            <span class="score-box upcoming">vs</span>
            <span class="team away"><span class="team-flag">${uai.flag}</span><span class="team-abbr">${uai.abbr}</span><span class="team-name">${m.away}</span></span>
          </div>
        </div>`;
      });
    }

    card.innerHTML = '';
    card.appendChild(hdr);
    const stWrapper = document.createElement('div');
    stWrapper.innerHTML = stHtml;
    card.appendChild(stWrapper);
    const matchWrapper = document.createElement('div');
    matchWrapper.className = 'matches-section';
    matchWrapper.innerHTML = matchHtml;
    card.appendChild(matchWrapper);
    grid.appendChild(card);
  });

  container.appendChild(grid);
}

// ── Predictions ───────────────────────────────────────────────────────────────

function findTeamPosition(name) {
  const groups = WC_DATA.predictions?.groups || {};
  for (const [grp, teams] of Object.entries(groups)) {
    const pos = teams.indexOf(name);
    if (pos !== -1) return {team: name, group: grp, pos: pos + 1};
  }
  return {team: name, group: '?', pos: '?'};
}

function findKoMatch(matchId) {
  const ko = WC_DATA.knockout;
  return [...ko.r32, ...ko.r16, ...ko.qf, ...ko.sf, ...ko.third_place, ...ko.final]
    .find(m => m.id === matchId) || null;
}

function groupStandingsFor(grp) {
  const group = WC_DATA.groups[grp];
  if (!group) return null;
  const st = computeStandings(group);
  return st.some(t => t.p > 0) ? st : null; // null if no matches played
}

function resolveSlot(label) {
  const preds = WC_DATA.predictions;
  if (!preds) return null;

  // "1st Group C", "2nd Group F", etc.
  let m = label.match(/^(\d+)(?:st|nd|rd|th) Group ([A-L])$/);
  if (m) {
    const pos = parseInt(m[1]);
    const grp = m[2];
    const actual = groupStandingsFor(grp);
    const team = actual
      ? actual[pos - 1]?.name          // use real standings
      : preds.groups?.[grp]?.[pos - 1]; // fall back to odds prediction
    return team ? {team, group: grp, pos} : null;
  }

  // "Best 3rd (A/B/C/D/F)"
  m = label.match(/^Best 3rd \(/);
  if (m) {
    const entry = preds.best_thirds_slots?.[label];
    if (!entry) return null;
    // If that group has actual results, use the actual 3rd-place team
    const actual = groupStandingsFor(entry.group);
    const team = actual ? actual[2]?.name : entry.team;
    return team ? {team, group: entry.group, pos: 3} : null;
  }

  // "W R32-73", "W R16-89", etc.
  m = label.match(/^W (.+)$/);
  if (m) {
    const matchId = m[1];
    const match = findKoMatch(matchId);
    if (!match) return null;
    // If match has a confirmed result, use actual winner
    if (match.score !== null && (match.home_team || match.away_team)) {
      const winner = match.score.h > match.score.a ? match.home_team : match.away_team;
      return winner ? findTeamPosition(winner) : null;
    }
    // Otherwise resolve winner from prediction
    const pred = preds.knockout?.[matchId];
    if (!pred) return null;
    // Team-name format: pred is the winning team name directly
    if (pred !== 'home' && pred !== 'away') return findTeamPosition(pred);
    // Legacy home/away format
    const winLabel = pred === 'home' ? match.home_label : match.away_label;
    return resolveSlot(winLabel);
  }

  // "L SF-101" (loser → 3rd place match)
  m = label.match(/^L (.+)$/);
  if (m) {
    const matchId = m[1];
    const match = findKoMatch(matchId);
    if (!match) return null;
    const pred = preds.knockout?.[matchId];
    if (!pred) return null;
    // Team-name format: loser is whichever participant is not the predicted winner
    if (pred !== 'home' && pred !== 'away') {
      const homeSlot = resolveSlot(match.home_label);
      const awaySlot = resolveSlot(match.away_label);
      if (homeSlot?.team === pred) return awaySlot;
      if (awaySlot?.team === pred) return homeSlot;
      return null;
    }
    // Legacy home/away format
    const loserLabel = pred === 'home' ? match.away_label : match.home_label;
    return resolveSlot(loserLabel);
  }

  return null;
}

function predHtml(resolved) {
  if (!resolved) return null;
  const {team, group, pos} = resolved;
  const {flag, abbr} = teamInfo(team);
  const suffix = group !== '?' ? ` <span class="pred-pos">${group}-${pos}</span>` : '';
  return `<span class="predicted">${flag} ${abbr} ${team}${suffix}</span>`;
}

// ── Knockout Bracket ──────────────────────────────────────────────────────────

function koTeamName(match, side) {
  const team = side === 'home' ? match.home_team : match.away_team;
  const label = side === 'home' ? match.home_label : match.away_label;
  return team || label || '?';
}

function koScoreStr(match, side) {
  if (!match.score) return '';
  return side === 'home' ? match.score.h : match.score.a;
}

function buildKoMatchEl(match, flipped) {
  const homeConfirmed = !!match.home_team;
  const awayConfirmed = !!match.away_team;
  const homeName = koTeamName(match, 'home');
  const awayName = koTeamName(match, 'away');
  const homeScore = koScoreStr(match, 'home');
  const awayScore = koScoreStr(match, 'away');
  const homeWin = match.score && match.score.h > match.score.a;
  const awayWin = match.score && match.score.h < match.score.a;
  const dt = fmtDatetime(match.date_bst, match.time_bst !== 'TBC' ? match.time_bst : '');

  // Resolve predictions for unconfirmed slots
  const homePred = !homeConfirmed ? resolveSlot(match.home_label) : null;
  const awayPred = !awayConfirmed ? resolveSlot(match.away_label) : null;

  function teamCell(confirmed, name, pred, isWin) {
    if (confirmed) {
      const {flag, abbr} = teamInfo(name);
      return `<span class="name">${flag} ${abbr} ${name}</span>`;
    }
    if (pred) return predHtml(pred);
    return `<span class="tbd">${name}</span>`;
  }

  const wrapper = document.createElement('div');
  wrapper.className = 'ko-match-wrapper';

  const box = document.createElement('div');
  box.className = 'ko-match';
  box.onclick = () => {
    const title = `${homeName} vs ${awayName}`;
    openMatch(match, title);
  };

  if (dt) {
    const newDot = match.new ? ' <span class="new-dot">⬤</span>' : '';
    box.innerHTML += `<div class="ko-team" style="border-bottom:none;padding:3px 8px"><span class="ko-date">${dt}${newDot}</span></div>`;
  }

  box.innerHTML += `
    <div class="ko-team">
      ${teamCell(homeConfirmed, homeName, homePred, homeWin)}
      ${match.score !== null ? `<span class="ko-score ${homeWin ? 'win' : ''}">${homeScore}</span>` : ''}
    </div>
    <div class="ko-team">
      ${teamCell(awayConfirmed, awayName, awayPred, awayWin)}
      ${match.score !== null ? `<span class="ko-score ${awayWin ? 'win' : ''}">${awayScore}</span>` : ''}
    </div>
  `;

  wrapper.appendChild(box);
  return wrapper;
}

function buildRoundCol(label, matches, flipped) {
  const col = document.createElement('div');
  col.className = 'round-col';
  const lbl = document.createElement('div');
  lbl.className = 'round-label';
  lbl.textContent = label;
  col.appendChild(lbl);

  if (matches.length > 1) {
    // Wrap consecutive pairs so CSS connectors can target nth-child correctly
    for (let i = 0; i < matches.length; i += 2) {
      const pair = document.createElement('div');
      pair.className = 'match-pair';
      pair.appendChild(buildKoMatchEl(matches[i], flipped));
      if (matches[i + 1]) pair.appendChild(buildKoMatchEl(matches[i + 1], flipped));
      col.appendChild(pair);
    }
  } else {
    // Single match (SF slot) — no pairing needed
    matches.forEach(m => col.appendChild(buildKoMatchEl(m, flipped)));
  }
  return col;
}

function renderKnockout() {
  const container = document.getElementById('knockout-view');
  const ko = WC_DATA.knockout;

  const bc = document.createElement('div');
  bc.className = 'bracket-container';

  // Left half: R32 matches 0-7 → R16 0-3 → QF 0-1 → SF 0
  const leftHalf = document.createElement('div');
  leftHalf.className = 'bracket-half left';
  leftHalf.appendChild(buildRoundCol('Round of 32', ko.r32.slice(0,8), false));
  leftHalf.appendChild(buildRoundCol('Round of 16', ko.r16.slice(0,4), false));
  leftHalf.appendChild(buildRoundCol('Quarter-finals', ko.qf.slice(0,2), false));
  leftHalf.appendChild(buildRoundCol('Semi-finals', ko.sf.slice(0,1), false));

  // Center: final
  const center = document.createElement('div');
  center.className = 'final-col';
  center.innerHTML = `<div class="round-label">Final</div>`;
  center.appendChild(buildKoMatchEl(ko.final[0], false));
  const tp = document.createElement('div');
  tp.className = 'third-place-section';
  tp.innerHTML = `<div class="round-label" style="margin-top:16px">3rd Place</div>`;
  tp.appendChild(buildKoMatchEl(ko.third_place[0], false));
  center.appendChild(tp);

  // Right half: SF 1 → QF 2-3 → R16 4-7 → R32 8-15 (reversed display)
  const rightHalf = document.createElement('div');
  rightHalf.className = 'bracket-half right';
  rightHalf.appendChild(buildRoundCol('Round of 32', ko.r32.slice(8,16), true));
  rightHalf.appendChild(buildRoundCol('Round of 16', ko.r16.slice(4,8), true));
  rightHalf.appendChild(buildRoundCol('Quarter-finals', ko.qf.slice(2,4), true));
  rightHalf.appendChild(buildRoundCol('Semi-finals', ko.sf.slice(1,2), true));

  bc.appendChild(leftHalf);
  bc.appendChild(center);
  bc.appendChild(rightHalf);

  container.appendChild(bc);
}

// ── View switching ────────────────────────────────────────────────────────────

function showView(v) {
  document.getElementById('group-view').classList.toggle('visible', v === 'group');
  document.getElementById('knockout-view').classList.toggle('visible', v === 'knockout');
  document.getElementById('tab-group').classList.toggle('active', v === 'group');
  document.getElementById('tab-knockout').classList.toggle('active', v === 'knockout');
}

// ── Init ─────────────────────────────────────────────────────────────────────

document.getElementById('updated-label').textContent = fmtUpdated(WC_DATA.updated);
renderGroups();
renderKnockout();
showView(WC_DATA.stage === 'group' ? 'group' : 'knockout');
</script>
